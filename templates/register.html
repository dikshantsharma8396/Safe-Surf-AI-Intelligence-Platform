{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center animate-fade-in mt-5">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <h2 class="text-center text-info mb-4" style="font-family: 'Orbitron';">
                <i class="fas fa-user-plus me-2"></i> CREATE ACCOUNT
            </h2>
            
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label text-white opacity-75 small fw-bold">Username</label>
                    <input type="text" name="username" class="form-control bg-dark text-white border-info py-2" placeholder="Choose a username" required autofocus>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-white opacity-75 small fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-info py-2" placeholder="For OTP and Recovery" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-white opacity-75 small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-info py-2" placeholder="Create a password" required>
                </div>
                
                <button type="submit" class="btn btn-info w-100 fw-bold py-2 shadow mb-3">REGISTER</button>
                
                <div class="text-center pt-3 border-top border-secondary border-opacity-25">
                    <p class="text-muted small mb-0">
                        Already have an account? 
                        <a href="{{ url_for('login') }}" class="text-info text-decoration-none fw-bold">Login Here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
